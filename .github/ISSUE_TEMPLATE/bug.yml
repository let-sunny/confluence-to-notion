name: Bug report
description: Report a defect in confluence-to-notion.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as
        much as you can — short issues are fine, but missing context slows
        triage.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong? One or two sentences.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact commands, URLs, or workflow that triggers the bug.
      placeholder: |
        1. Run `pnpm exec c2n ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What happened instead? Include any error output.
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      description: "Output of `node --version` (e.g. v20.18.0)."
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      description: "e.g. macOS 14.5, Ubuntu 24.04, Windows 11."
    validations:
      required: true
  - type: dropdown
    id: contribute
    attributes:
      label: Are you willing to open a PR to fix this?
      options:
        - "Yes, I'd like to fix it"
        - "Maybe, with guidance"
        - "No"
    validations:
      required: true
