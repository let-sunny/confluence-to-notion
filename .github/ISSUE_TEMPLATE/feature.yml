name: Feature request
description: Suggest a new capability or improvement.
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What do you want to be able to do?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why does this matter? What problem does it solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: How might it work? CLI shape, API, etc. Rough is fine.
  - type: input
    id: node-version
    attributes:
      label: Node version (if relevant)
      description: "Output of `node --version`."
  - type: input
    id: os
    attributes:
      label: Operating system (if relevant)
  - type: dropdown
    id: contribute
    attributes:
      label: Are you willing to open a PR for this?
      options:
        - "Yes, I'd like to implement it"
        - "Maybe, with guidance"
        - "No"
    validations:
      required: true
