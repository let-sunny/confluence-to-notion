<!-- Common Confluence pattern: expand (accordion) containing a code block -->
<ac:structured-macro ac:name="expand" ac:schema-version="1">
  <ac:parameter ac:name="title">Show configuration example</ac:parameter>
  <ac:rich-text-body>
    <p>Add the following to your <code>server.properties</code>:</p>
    <ac:structured-macro ac:name="code" ac:schema-version="1">
      <ac:parameter ac:name="language">properties</ac:parameter>
      <ac:parameter ac:name="title">server.properties</ac:parameter>
      <ac:plain-text-body><![CDATA[broker.id=0
listeners=PLAINTEXT://:9092
log.dirs=/tmp/kafka-logs]]></ac:plain-text-body>
    </ac:structured-macro>
  </ac:rich-text-body>
</ac:structured-macro>
