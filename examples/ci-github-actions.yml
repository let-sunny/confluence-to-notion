# Sample GitHub Actions workflow for `confluence-to-notion`.
#
# This file is documentation, not a real workflow — it lives under examples/
# and is NOT auto-discovered by Actions. To use it:
#
#   1. Copy this file into the consumer repo at `.github/workflows/migrate.yml`.
#   2. Add the referenced secrets under Settings → Secrets and variables →
#      Actions: NOTION_API_TOKEN, NOTION_ROOT_PAGE_ID, CONFLUENCE_BASE_URL,
#      CONFLUENCE_EMAIL (private wikis), CONFLUENCE_API_TOKEN (private wikis).
#   3. Trigger via the "Run workflow" button on the Actions tab.
#
# The workflow installs nothing globally — it pulls the published package from
# npm at run time via `npx -y confluence-to-notion@latest`. Pin the version
# (e.g. `confluence-to-notion@0.1.0`) for reproducible runs.

name: Migrate Confluence subtree to Notion

on:
  workflow_dispatch:
    inputs:
      confluence_root_page_id:
        description: "Confluence root page ID to migrate from"
        required: true
        type: string
      confluence_url:
        description: "Confluence source URL (used for run slug + dispatch)"
        required: true
        type: string
      notion_target_page_id:
        description: "Notion parent page ID (overrides NOTION_ROOT_PAGE_ID)"
        required: false
        type: string

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Notion token
        env:
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
        run: npx -y confluence-to-notion@latest c2n notion-ping

      - name: Migrate subtree
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_EMAIL: ${{ secrets.CONFLUENCE_EMAIL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}
          NOTION_API_TOKEN: ${{ secrets.NOTION_API_TOKEN }}
          NOTION_ROOT_PAGE_ID: ${{ secrets.NOTION_ROOT_PAGE_ID }}
        run: |
          npx -y confluence-to-notion@latest c2n migrate-tree-pages \
            --root-id "${{ inputs.confluence_root_page_id }}" \
            --url "${{ inputs.confluence_url }}" \
            ${{ inputs.notion_target_page_id && format('--target {0}', inputs.notion_target_page_id) || '' }}

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-run
          path: output/runs/
          if-no-files-found: ignore
